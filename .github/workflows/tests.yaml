# .github/workflows/tests.yml
# Based on https://github.com/orgs/community/discussions/52616
name: Tests
on:
  # workflow_call is a required field of the "on" property,
  # when intending to use the workflow as a reusable workflow
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache TeXLive install
        id: cache-texlive
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/texlive
          key: texlive-cache-2026-Mar-1.3

      - name: Install TeXLive (if not cached)
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          wget https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz
          tar -xzf install-tl-unx.tar.gz
          cd install-tl-*/
          sudo ./install-tl --no-interaction --scheme=small
          ls -la /usr/local/texlive
          tree /usr/local/texlive -L 3
          echo "/usr/local/texlive/2024/bin/x86_64-linux" >> $GITHUB_PATH

      - name: Add TeXLive to PATH (if cached)
        if: steps.cache-texlive.outputs.cache-hit == 'true'
        run: echo "/usr/local/texlive/2024/bin/x86_64-linux" >> $GITHUB_PATH
      - name: Test LaTeX
        run: |
          echo $PATH
          type pdflatex
          pdflatex -v
